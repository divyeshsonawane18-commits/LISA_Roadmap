// ─── FIREBASE PERSISTENCE ───
const FB_CFG_KEY = 'lisa-roadmap-firebase-cfg';

function getFirebaseCfg() {
  try { return JSON.parse(localStorage.getItem(FB_CFG_KEY) || 'null'); } catch { return null; }
}
function saveFirebaseCfg(cfg) {
  localStorage.setItem(FB_CFG_KEY, JSON.stringify(cfg));
}
function clearFirebaseCfg() {
  localStorage.removeItem(FB_CFG_KEY);
}

let _fbApp = null, _fbDb = null;
function initFirebase(cfg) {
  try {
    if (_fbApp) { try { _fbApp.delete(); } catch {} }
    _fbApp = firebase.initializeApp(cfg, 'lisa-roadmap-' + Date.now());
    _fbDb = firebase.database(_fbApp);
    return true;
  } catch(e) { console.error('Firebase init failed', e); return false; }
}
function fbRef() { return _fbDb ? _fbDb.ref('roadmap') : null; }

// Migration: backfill plannedQuarter on every item that's missing it.
// plannedQuarter = the quarter the feature was originally assigned to, set once, never changed.
// For done items already sitting in 'completed' column, use originalQuarter if available.
function migrateData(data) {
  const items = (data.items||[]).map(item => {
    let i = { ...item };
    // Derive plannedQuarter if missing
    if (!i.plannedQuarter) {
      if (i.originalQuarter && i.originalQuarter !== 'pre-2026') {
        i.plannedQuarter = i.originalQuarter;
      } else if (i.quarter && i.quarter !== 'completed') {
        i.plannedQuarter = i.quarter;
      } else if (i.originalQuarter === 'pre-2026') {
        i.plannedQuarter = 'pre-2026';
      } else {
        i.plannedQuarter = 'pre-2026'; // fallback for old completed items with no quarter
      }
    }
    // For done items still sitting in a real quarter column (not yet moved), push to completed
    if (i.status === 'done' && i.quarter !== 'completed') {
      i.quarter = 'completed';
    }
    return i;
  });
  return { ...data, items };
}

function loadData() {
  try {
    // Try localStorage first (v5, then v4 for backwards compat), then SEED
    const saved = localStorage.getItem('lisa-roadmap-v5') || localStorage.getItem('lisa-roadmap-v4');
    return migrateData(saved ? JSON.parse(saved) : SEED_DATA);
  } catch { return migrateData(SEED_DATA); }
}
function genId() { return 'i' + Date.now() + Math.random().toString(36).slice(2,6); }
function now() { return new Date().toISOString().slice(0,10); }

function FirebaseSetup({ onConnected }) {
  const [cfg, setCfg] = useState({
    apiKey:'', authDomain:'', databaseURL:'', projectId:'', storageBucket:'', messagingSenderId:'', appId:''
  });
  const [error, setError] = useState('');
  const [testing, setTesting] = useState(false);
  const [pasteMode, setPasteMode] = useState(true);
  const [rawPaste, setRawPaste] = useState('');

  const parseAndFill = (text) => {
    // Accept either the full Firebase config object JS/JSON or just the databaseURL
    const patterns = {
      apiKey: /apiKey:\s*["']([^"']+)["']/,
      authDomain: /authDomain:\s*["']([^"']+)["']/,
      databaseURL: /databaseURL:\s*["']([^"']+)["']/,
      projectId: /projectId:\s*["']([^"']+)["']/,
      storageBucket: /storageBucket:\s*["']([^"']+)["']/,
      messagingSenderId: /messagingSenderId:\s*["']([^"']+)["']/,
      appId: /appId:\s*["']([^"']+)["']/,
    };
    const parsed = {};
    let found = 0;
    for (const [k, re] of Object.entries(patterns)) {
      const m = text.match(re);
      if (m) { parsed[k] = m[1]; found++; }
    }
    if (found >= 2) { setCfg(c=>({...c,...parsed})); setError(''); }
    else setError('Could not parse config — try filling fields manually below.');
  };

  const connect = async () => {
    setError(''); setTesting(true);
    if (!cfg.apiKey || !cfg.databaseURL) {
      setError('API Key and Database URL are required.'); setTesting(false); return;
    }
    if (!cfg.databaseURL.includes('firebaseio.com') && !cfg.databaseURL.includes('firebasedatabase.app')) {
      setError('Database URL should end in .firebaseio.com or .firebasedatabase.app'); setTesting(false); return;
    }
    const ok = initFirebase(cfg);
    if (!ok) { setError('Firebase initialisation failed — check your config.'); setTesting(false); return; }
    // Test write/read
    try {
      const ref = fbRef();
      await ref.child('_ping').set(Date.now());
      saveFirebaseCfg(cfg);
      setTesting(false);
      onConnected();
    } catch(e) {
      setError('Connection failed: ' + (e.message||'check your database rules allow read/write'));
      setTesting(false);
    }
  };

  const field = (label, key, placeholder) => (
    <div style={{ marginBottom:12 }}>
      <label style={{ display:'block', fontSize:12, fontWeight:700, color:'var(--grey-600)', marginBottom:4 }}>{label}</label>

    </div>

  return (

              <span style={{ color:'#fff', fontWeight:800, fontSize:18 }}>L</span>

            <div>
              <div style={{ fontSize:18, fontWeight:800, fontFamily:'var(--font-display)' }}>
                <span style={{ background:'var(--lisa-gradient)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent' }}>LISA Roadmap</span>
              </div>
              <div style={{ fontSize:11, color:'var(--grey-500)', fontWeight:600, textTransform:'uppercase', letterSpacing:.5 }}>Team Collaboration Setup</div>
            </div>
          </div>
          <p style={{ fontSize:13, color:'var(--grey-600)', lineHeight:1.6, margin:0 }}>
            Connect a Firebase Realtime Database so your entire team edits the same live roadmap. Takes 2 minutes to set up — free tier is plenty.
          </p>
        </div>

        <div style={{ padding:'24px 32px' }}>
          {/* Step guide */}
          <div style={{ background:'var(--grey-50)', borderRadius:'var(--r-lg)', padding:'14px 16px', marginBottom:20, border:'1px solid var(--surface-hairline)' }}>
            <div style={{ fontSize:12, fontWeight:700, color:'var(--grey-700)', marginBottom:8 }}>Quick setup (2 min)</div>
            {[
              ['1', 'Go to', 'console.firebase.google.com', 'https://console.firebase.google.com'],
              ['2', 'Create a project → Build → Realtime Database → Create database', '', ''],
              ['3', 'Start in test mode (you can secure it later)', '', ''],
              ['4', 'Project Settings → Your apps → Add Web app → copy the config', '', ''],
            ].map(([n, text, link, href])=>(
              <div key={n} style={{ display:'flex', gap:8, alignItems:'flex-start', marginBottom:5 }}>
                <span style={{ width:18, height:18, borderRadius:'50%', background:'var(--lisa-gradient)', color:'#fff', fontSize:10, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1 }}>{n}</span>

                  {text}{' '}

          {pasteMode ? (

                  ✓ Parsed — Database URL: {cfg.databaseURL}
                </div>
              )}
            </div>
          ) : (
            <div>
              {field('API Key *', 'apiKey', 'AIzaSy...')}
              {field('Database URL *', 'databaseURL', 'https://your-project-default-rtdb.firebaseio.com')}
              {field('Project ID', 'projectId', 'your-project-id')}
              {field('Auth Domain', 'authDomain', 'your-project.firebaseapp.com')}
              {field('App ID', 'appId', '1:123456:web:abcdef')}

          {error && (
            <div style={{ padding:'10px 14px', background:'#fee2e2', borderRadius:'var(--r-md)', border:'1px solid #fca5a5', fontSize:13, color:'#dc2626', marginBottom:12 }}>

            </div>
          )}

          <div style={{ display:'flex', gap:10 }}>
            <button onClick={connect} disabled={testing}
              style={{ flex:1, padding:'11px', borderRadius:'var(--r-md)', border:'none',
                background: testing ? 'var(--grey-300)' : 'var(--lisa-gradient)', color:'#fff', fontSize:14, fontWeight:700, cursor: testing ? 'not-allowed' : 'pointer' }}>

    </div>
  );
}

          background:'#fff', fontSize:14, color:'var(--fg-2)', fontWeight:600 }}>Cancel</button>

  );

// ─── DASHBOARD ───
function Dashboard({ data }) {
  const chartRef1 = useRef(null), chartRef2 = useRef(null), chartRef3 = useRef(null);
  const charts = useRef({});

  const total = data.items.length;
  const byStatus = { yet:0, progress:0, done:0 };
  data.items.forEach(i => { byStatus[i.status] = (byStatus[i.status]||0)+1; });
  const completePct = total > 0 ? Math.round(byStatus.done/total*100) : 0;

  // ── QUARTER LOGIC ──────────────────────────────────────────────────────────
  // The dashboard is INDEPENDENT of what quarter columns currently exist on the board.
  // For each item:
  //   plannedQuarter = the quarter it was originally assigned to (set once at creation, never changed)
  //
  // Completed items are counted in their plannedQuarter bucket — even if that quarter
  // column has been deleted from the board.
  // In-progress and yet-to-start items are counted in their plannedQuarter bucket too.
  //
  // We collect ALL distinct plannedQuarter values across all items, sort them, and build
  // the chart from that — no dependency on data.quarters at all.

  const shortLabel = (qid) => {
    // Try to find a nice label from the quarters list first
    const q = data.quarters.find(q => q.id === qid);
    if (q) return q.label
      .replace(' 2026','').replace(' 2025','').replace(' 2027','')
      .replace(' (Jan to Mar)','').replace(' (Apr to Jun)','')
      .replace(' (Jul to Sept)','').replace(' (Oct to Dec)','');
    if (qid === 'pre-2026') return 'Pre-2026';
    if (qid === 'completed') return 'Pre-2026';
    return qid;
  };

  // Collect all unique plannedQuarter values, sorted logically
  const allPlannedQIds = [...new Set(data.items.map(i => i.plannedQuarter || 'pre-2026'))];

  // Sort: pre-2026 first, then by order of matching quarter in data.quarters, then alphabetically
  const qOrder = (id) => {
    if (id === 'pre-2026') return -1;
    const q = data.quarters.find(q => q.id === id);
    return q ? q.order : 999;
  };
  allPlannedQIds.sort((a,b) => qOrder(a) - qOrder(b));

  // Per-plannedQuarter counts
  const qRows = allPlannedQIds.map(qid => {
    const qItems = data.items.filter(i => (i.plannedQuarter || 'pre-2026') === qid);
    const done     = qItems.filter(i => i.status === 'done').length;
    const progress = qItems.filter(i => i.status === 'progress').length;
    const yet      = qItems.filter(i => i.status === 'yet').length;
    const tot      = qItems.length;
    return {
      id: qid,
      label: shortLabel(qid),
      done, progress, yet,
      total: tot,

// ─── IMPORT/EXPORT ───
function ImportExport({ data, onImport, onClose }) {
  const [tab, setTab] = useState('export');
  const [importText, setImportText] = useState('');

  const exportCSV = () => {
    const headers = ['Title','Description','Owner','Priority','Quarter','Workstream','Status','StartDate','TargetDate','Tags','Notes','CreatedAt','UpdatedAt'];
    const rows = data.items.map(item => {
      const q = data.quarters.find(q=>q.id===item.quarter)?.label||'';
      const w = data.workstreams.find(w=>w.id===item.workstream)?.label||'';
      const s = STATUSES.find(s=>s.id===item.status)?.label||'';
      return [item.title,item.description,item.owner,item.priority,q,w,s,item.startDate,item.targetDate,(item.tags||[]).join(';'),item.notes,item.createdAt,item.updatedAt].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',');
    });
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='lisa-roadmap.csv'; a.click();
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='lisa-roadmap.json'; a.click();
  };

  const handleImportJSON = () => {
    try {
      const parsed = JSON.parse(importText);
      if (parsed.items && parsed.quarters && parsed.workstreams) {
        onImport(parsed);
        onClose();
      } else alert('Invalid roadmap JSON format');
    } catch { alert('Invalid JSON'); }
  };

  return (
    <div style={{ padding:24 }}>
      <div style={{ display:'flex', gap:2, marginBottom:20, background:'var(--grey-100)', borderRadius:'var(--r-md)', padding:3 }}>
        {['export','import'].map(t => (
          <button key={t} onClick={()=>setTab(t)} style={{ flex:1, padding:'7px', borderRadius:'var(--r-sm)', border:'none',
            background: tab===t ? '#fff' : 'transparent', fontWeight:700, fontSize:13, color: tab===t ? 'var(--fg-1)' : 'var(--grey-500)',
            boxShadow: tab===t ? 'var(--shadow-100)' : 'none', textTransform:'capitalize' }}>
            {t}
          </button>
        ))}
      </div>
      {tab==='export' ? (
        <div>
          <p style={{ fontSize:13, color:'var(--grey-500)', marginBottom:20 }}>{data.items.length} initiatives ready to export.</p>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <button onClick={exportCSV} style={{ padding:'12px 20px', borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)',
              background:'#fff', fontSize:14, fontWeight:700, color:'var(--fg-1)', textAlign:'left', display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ fontSize:24 }}>📊</span>
              <div><div>Export as CSV</div><div style={{ fontSize:12, fontWeight:400, color:'var(--grey-500)' }}>Compatible with Excel, Google Sheets</div></div>
            </button>
            <button onClick={exportJSON} style={{ padding:'12px 20px', borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)',
              background:'#fff', fontSize:14, fontWeight:700, color:'var(--fg-1)', textAlign:'left', display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ fontSize:24 }}>📦</span>
              <div><div>Export as JSON</div><div style={{ fontSize:12, fontWeight:400, color:'var(--grey-500)' }}>Full data backup, re-importable</div></div>
            </button>
          </div>
        </div>
      ) : (
        <div>
          <p style={{ fontSize:13, color:'var(--grey-500)', marginBottom:12 }}>Paste exported JSON to restore a full roadmap backup.</p>
          <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={10} placeholder='Paste JSON here...'
            style={{ width:'100%', padding:'10px 12px', border:'1px solid var(--surface-border)', borderRadius:'var(--r-md)', fontSize:12, fontFamily:'monospace', resize:'vertical' }} />
          <button onClick={handleImportJSON} style={{ marginTop:12, width:'100%', padding:'10px', borderRadius:'var(--r-md)',

            Import Roadmap
          </button>
        </div>
      )}
    </div>
  );
}

// ─── REDUCER ───
function reducer(state, action) {
  switch (action.type) {
    case 'ADD_ITEM': {
      const item = { ...action.item };
      if (!item.plannedQuarter) item.plannedQuarter = item.quarter;
      return { ...state, items: [...state.items, item] };
    }
    case 'UPDATE_ITEM': {
      const prev = state.items.find(i => i.id === action.item.id);
      let updated = { ...action.item };
      if (prev) updated.plannedQuarter = prev.plannedQuarter || prev.quarter;
      if (!updated.plannedQuarter && updated.quarter && updated.quarter !== 'completed') {
        updated.plannedQuarter = updated.quarter;
      }
      if (updated.status === 'done') {
        updated.quarter = 'completed';
        updated.completedAt = updated.completedAt || now();
      } else {
        updated.completedAt = null;
        if (updated.quarter === 'completed') {
          updated.quarter = updated.plannedQuarter || updated.quarter;
        }
      }
      return { ...state, items: state.items.map(i => i.id===updated.id ? updated : i) };
    }
    case 'DELETE_ITEM': return { ...state, items: state.items.filter(i => i.id!==action.id) };
    case 'MOVE_ITEM': {
      return { ...state, items: state.items.map(i => {
        if (i.id !== action.id) return i;
        return { ...i, quarter:action.quarter, workstream:action.workstream, updatedAt:now(),
          activity:[...(i.activity||[]),{type:'moved',label:`Moved to ${action.quarter}/${action.workstream}`,ts:now()}] };
      })};
    }
    case 'ADD_QUARTER': return { ...state, quarters: [...state.quarters, action.quarter] };
    case 'UPDATE_QUARTER': return { ...state, quarters: state.quarters.map(q => q.id===action.id ? {...q, label:action.label} : q) };
    case 'DELETE_QUARTER': return { ...state, quarters: state.quarters.filter(q=>q.id!==action.id) };
    case 'ADD_WORKSTREAM': return { ...state, workstreams: [...state.workstreams, action.workstream] };
    case 'UPDATE_WORKSTREAM': return { ...state, workstreams: state.workstreams.map(w => w.id===action.id ? {...w, label:action.label} : w) };
    case 'DELETE_WORKSTREAM': return { ...state, workstreams: state.workstreams.filter(w=>w.id!==action.id) };
    // ── EPICS ──
    case 'ADD_EPIC':    return { ...state, epics: [...(state.epics||[]), action.epic] };
    case 'UPDATE_EPIC': return { ...state, epics: (state.epics||[]).map(e => e.id===action.epic.id ? action.epic : e) };
    case 'DELETE_EPIC': return { ...state, epics: (state.epics||[]).filter(e => e.id!==action.id) };
    case 'SET_EPICS':   return { ...state, epics: action.epics };
    case 'IMPORT': return { epics:[], ...action.data };
    default: return state;
  }
}

                  <input type="checkbox" checked={checked} onChange={()=>toggleFeature(feat.id)} style={{ marginTop:2, flexShrink:0 }} />
                  <div>
                    <div style={{ fontSize:12, fontWeight: checked?700:400, color: sc.title }}>{feat.title}</div>
                    <div style={{ fontSize:10, color:'var(--grey-400)' }}>{feat.plannedQuarter||feat.quarter}</div>
                  </div>
                </label>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ display:'flex', gap:10, justifyContent:'flex-end', marginTop:4 }}>
        <button onClick={onClose} style={{ padding:'9px 20px', borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)', background:'#fff', fontSize:14, fontWeight:600, color:'var(--fg-2)' }}>Cancel</button>
        <button onClick={handleSave} style={{ padding:'9px 20px', borderRadius:'var(--r-md)', background:'var(--lisa-gradient)', color:'#fff', fontSize:14, fontWeight:700, border:'none' }}>
          {isNew ? 'Create Epic' : 'Save Epic'}
        </button>
      </div>
    </div>
  );
}

            <div style={{ fontSize:12, color:'var(--grey-500)' }}>{shortQ(qStart)} → {shortQ(qEnd)}</div>

            <button onClick={()=>{if(confirm('Delete this epic?')){onDelete(epic.id);onClose();}}} style={{ padding:'6px 12px', fontSize:12, fontWeight:700, borderRadius:'var(--r-md)', border:'none', background:'#fee2e2', color:'#dc2626' }}>Delete</button>
            <button onClick={onClose} style={{ width:32, height:32, borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)', background:'#fff', fontSize:16, color:'var(--grey-500)', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
          </div>

      {/* Narrative */}
      {epic.narrative && (
        <div style={{ padding:'16px 24px', borderBottom:'1px solid var(--surface-hairline)', flexShrink:0 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'var(--grey-500)', textTransform:'uppercase', letterSpacing:.5, marginBottom:6 }}>The Story</div>
          <p style={{ fontSize:14, color:'var(--fg-2)', lineHeight:1.65, fontStyle:'italic' }}>"{epic.narrative}"</p>
        </div>

      {/* Features */}
      <div style={{ flex:1, overflowY:'auto', padding:'16px 24px' }}>
        <div style={{ fontSize:11, fontWeight:700, color:'var(--grey-500)', textTransform:'uppercase', letterSpacing:.5, marginBottom:12 }}>
          Features ({features.length})

          const s  = STATUSES.find(x=>x.id===feat.status)||STATUSES[0];
          return (
            <div key={feat.id} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 12px',
              borderRadius:'var(--r-lg)', background:sc.bg, border:`1px solid ${sc.border}`, marginBottom:8 }}>
              <span style={{ width:8, height:8, borderRadius:'50%', background:sc.dot, flexShrink:0, marginTop:4 }} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:700, color:sc.title, lineHeight:1.3, marginBottom:3 }}>{feat.title}</div>
                <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
                  <span style={{ fontSize:10, fontWeight:600, padding:'1px 7px', borderRadius:'var(--r-pill)', background:`${s.color}22`, color:sc.sub }}>{s.label}</span>
                  <span style={{ fontSize:10, fontWeight:600, padding:'1px 7px', borderRadius:'var(--r-pill)', background:`${PRIORITY_COLORS[feat.priority]}18`, color:PRIORITY_COLORS[feat.priority] }}>{feat.priority}</span>
                  {feat.plannedQuarter && feat.plannedQuarter!=='pre-2026' && (
                    <span style={{ fontSize:10, color:'var(--grey-400)' }}>
                      {data.quarters.find(q=>q.id===feat.plannedQuarter)?.label||feat.plannedQuarter}

}

// ─── LEADERSHIP VIEW ───
function LeadershipView({ data, dispatch }) {
  const [activeEpic, setActiveEpic] = useState(null);
  const [editEpic, setEditEpic]     = useState(null);
  const [addEpic, setAddEpic]       = useState(null);
  const [aiLoading, setAiLoading]   = useState(false);
  const [aiError, setAiError]       = useState('');
  const [aiDone, setAiDone]         = useState(false);

  // Scroll refs — must be at top level, never inside nested functions
  const mirrorRef = useRef(null);
  const boardRef  = useRef(null);
  const syncFromMirror = () => { if(boardRef.current)  boardRef.current.scrollLeft  = mirrorRef.current.scrollLeft; };
  const syncFromBoard  = () => { if(mirrorRef.current) mirrorRef.current.scrollLeft = boardRef.current.scrollLeft; };

  const epics   = data.epics || [];
  const realQ   = [...data.quarters].filter(q=>q.id!=='completed').sort((a,b)=>a.order-b.order);
  const sortedW = [...data.workstreams].sort((a,b)=>a.order-b.order);

  const COL_W  = 200;
  const ROW_H  = 52;
  const LEFT_W = 200;

  const qIdx = useMemo(() => {
    const m = {};
    realQ.forEach((q,i) => m[q.id]=i);
    return m;
  }, [realQ]);

  const shortQ = q => q.label
    .replace(' (Jan to Mar)','').replace(' (Apr to Jun)','')
    .replace(' (Jul to Sept)','').replace(' (Oct to Dec)','');

  // ── AI SUGGEST ──
  const suggestEpics = useCallback(async () => {
    setAiLoading(true); setAiError('');
    try {
      const grouped = {};
      sortedW.forEach(w => {
        const wItems = data.items.filter(i => i.workstream === w.id);
        if (wItems.length) grouped[w.label] = {
          id: w.id,
          items: wItems.map(i => ({ id:i.id, title:i.title, quarter:i.plannedQuarter||i.quarter, status:i.status }))
        };
      });

      const prompt = `You are a product strategist creating a leadership roadmap for LISA (Liaison Intelligence Super Agent) — an AI Digital Workforce platform for pharmaceutical commercial operations at Indegene.

Here are all tactical features grouped by agent/workstream:
${JSON.stringify(grouped, null, 2)}

Available quarters: ${realQ.map(q=>`${q.id} ("${q.label}")`).join(', ')}

Group features into strategic EPICS for a leadership audience:
- 2–4 epics per workstream (skip workstreams with 0 features)
- Epic title: bold executive capability statement, NOT a feature list
- narrative: 1–2 sentences of pharma leadership business value
- quarterStart / quarterEnd: from the available quarter IDs, based on when features are planned
- status: "completed" if all linked features done, "active" if some in-progress, "planned" otherwise
- featureIds: array of feature IDs from the input belonging to this epic

Respond ONLY with a raw JSON array, no markdown, no explanation:
[{"title":"...","narrative":"...","workstream":"ws_id","quarterStart":"q_id","quarterEnd":"q_id","status":"planned","featureIds":["id1"]}]`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 8000,
          messages: [{ role:'user', content:prompt }]
        })
      });
      const result = await res.json();
      if (result.error) throw new Error(result.error.message);
      const text = (result.content||[]).map(b=>b.text||'').join('').trim();
      const cleaned = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
      const suggested = JSON.parse(cleaned);
      if (!Array.isArray(suggested)) throw new Error('Expected JSON array');
      const withIds = suggested.map((e,idx) => {
        const w = data.workstreams.find(w=>w.id===e.workstream);
        return { ...e, id:'ep-'+Date.now()+'-'+idx, color: w?.color||'#4f63d2' };
      });
      dispatch({ type:'SET_EPICS', epics: withIds });
      setAiDone(true);
    } catch(err) {
      console.error(err);
      setAiError('AI generation failed: '+(err.message||'unknown error')+'. You can add epics manually below.');
    } finally {
      setAiLoading(false);
    }
  }, [data.items, data.workstreams, realQ, dispatch, sortedW]);

  // Auto-generate on first mount if no epics exist
  useEffect(() => {
    if (epics.length === 0 && !aiLoading && !aiDone) {
      suggestEpics();
    }
  }, []); // eslint-disable-line

  const totalEpics     = epics.length;
  const activeEpics    = epics.filter(e=>e.status==='active').length;
  const completedEpics = epics.filter(e=>e.status==='completed').length;

  return (
    <div>
      {/* Leadership header */}
      <div style={{ background:'linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e3a5f 100%)',
        borderRadius:'var(--r-xl)', padding:'28px 32px', marginBottom:20, color:'#fff', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', right:-40, top:-40, width:200, height:200, borderRadius:'50%', background:'rgba(255,255,255,.04)', pointerEvents:'none' }} />
        <div style={{ display:'flex', alignItems:'flex-start', gap:20 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, fontWeight:700, color:'rgba(255,255,255,.5)', textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>Leadership View</div>
            <h1 style={{ fontSize:26, fontWeight:800, marginBottom:8, fontFamily:'var(--font-display)' }}>LISA Strategic Roadmap 2026</h1>
            <p style={{ fontSize:14, color:'rgba(255,255,255,.7)', lineHeight:1.6, maxWidth:540 }}>
              Strategic capability epics across agents and quarters. Click any bar to explore features and the story behind each epic.
            </p>
          </div>
          <div style={{ display:'flex', gap:16, flexShrink:0 }}>
            {[[totalEpics,'Epics'],[activeEpics,'Active'],[completedEpics,'Delivered']].map(([v,l])=>(
              <div key={l} style={{ textAlign:'center', padding:'12px 16px', background:'rgba(255,255,255,.08)', borderRadius:'var(--r-lg)', minWidth:60 }}>
                <div style={{ fontSize:24, fontWeight:800, lineHeight:1 }}>{v}</div>
                <div style={{ fontSize:11, color:'rgba(255,255,255,.5)', marginTop:3, fontWeight:600 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ display:'flex', gap:10, marginTop:20, flexWrap:'wrap', alignItems:'center' }}>
          {aiLoading ? (
            <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 18px',
              borderRadius:'var(--r-md)', background:'rgba(255,255,255,.12)', border:'1px solid rgba(255,255,255,.2)' }}>
              <span style={{ fontSize:18 }}>✨</span>
              <div>
                <div style={{ fontSize:13, fontWeight:700 }}>Generating strategic epics with AI…</div>
                <div style={{ fontSize:11, color:'rgba(255,255,255,.6)', marginTop:2 }}>Analysing {data.items.length} features across {sortedW.length} workstreams</div>
              </div>
            </div>
          ) : (
            <>
              <button onClick={suggestEpics} style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'none',
                background:'linear-gradient(90deg,#6366f1,#9b59b6)', color:'#fff', fontSize:13, fontWeight:700, display:'flex', alignItems:'center', gap:7 }}>
                ✨ {epics.length > 0 ? 'Re-generate Epics' : 'Generate Epics with AI'}
              </button>
              <button onClick={()=>setAddEpic({ workstream:sortedW[0]?.id })}
                style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'1px solid rgba(255,255,255,.25)',
                  background:'rgba(255,255,255,.08)', color:'#fff', fontSize:13, fontWeight:700 }}>
                + Add Epic Manually
              </button>
              {epics.length > 0 && (
                <span style={{ fontSize:12, color:'rgba(255,255,255,.55)' }}>
                  {totalEpics} epics across {[...new Set(epics.map(e=>e.workstream))].length} workstreams — click any bar to explore
                </span>
              )}
            </>
          )}
        </div>
        {aiError && <div style={{ marginTop:12, padding:'10px 14px', background:'rgba(239,68,68,.15)', borderRadius:'var(--r-md)', fontSize:12, color:'#fca5a5' }}>{aiError}</div>}
      </div>

      {/* Timeline grid */}
      {aiLoading ? (
        <div style={{ background:'#fff', borderRadius:'var(--r-xl)', border:'1px solid var(--surface-border)',
          padding:'80px 40px', textAlign:'center' }}>
          <div style={{ fontSize:40, marginBottom:16 }}>✨</div>
          <div style={{ fontSize:16, fontWeight:700, color:'var(--fg-1)', marginBottom:8 }}>AI is building your strategic roadmap…</div>
          <div style={{ fontSize:13, color:'var(--grey-500)', maxWidth:400, margin:'0 auto', lineHeight:1.6 }}>
            Grouping {data.items.length} features into executive-level epics. This takes about 15–20 seconds.
          </div>
          <div style={{ display:'flex', gap:8, justifyContent:'center', marginTop:24, flexWrap:'wrap' }}>
            {sortedW.slice(0,6).map((w,i) => (
              <div key={w.id} style={{ width:120, height:8, borderRadius:4, background:`${w.color}30`, position:'relative', overflow:'hidden' }}>
                <div style={{ position:'absolute', top:0, left:0, bottom:0, width:'60%', background:w.color, borderRadius:4,
                  animation:`pulse ${1+i*0.2}s ease-in-out infinite` }} />
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div style={{ background:'#fff', borderRadius:'var(--r-xl)', border:'1px solid var(--surface-border)', boxShadow:'var(--shadow-100)' }}>
          {/* Top mirror scrollbar */}
          <div ref={mirrorRef} onScroll={syncFromMirror}
            style={{ overflowX:'auto', overflowY:'hidden', height:10, background:'var(--grey-50)',
              borderBottom:'1px solid var(--surface-hairline)', cursor:'ew-resize' }}>
            <div style={{ width: LEFT_W + realQ.length*COL_W, height:1 }} />
          </div>

          {/* Main scrollable board */}
          <div ref={boardRef} onScroll={syncFromBoard}
            style={{ overflowX:'auto', overflowY:'auto', maxHeight:'calc(100vh - 320px)' }}>
            <div style={{ minWidth: LEFT_W + realQ.length*COL_W }}>

              {/* Quarter header */}
              <div style={{ display:'grid', gridTemplateColumns:`${LEFT_W}px repeat(${realQ.length},${COL_W}px)`,
                position:'sticky', top:0, zIndex:20, background:'#fff', borderBottom:'2px solid var(--surface-border)' }}>
                <div style={{ padding:'14px 18px' }}>
                  <span style={{ fontSize:11, fontWeight:700, color:'var(--grey-500)', textTransform:'uppercase', letterSpacing:.5 }}>Workstream</span>
                </div>
                {realQ.map((q,i) => (
                  <div key={q.id} style={{ padding:'14px 16px', borderLeft:'1px solid var(--surface-hairline)', background:i%2===0?'#fff':'#fafbfd' }}>
                    <div style={{ fontSize:13, fontWeight:800 }}>{shortQ(q)}</div>
                    <div style={{ fontSize:10, color:'var(--grey-400)', marginTop:1 }}>
                      {epics.filter(e => (qIdx[e.quarterStart]||0)<=i && (qIdx[e.quarterEnd]??qIdx[e.quarterStart]??0)>=i).length} epics
                    </div>
                  </div>
                ))}
              </div>

              {/* Workstream rows */}
              {sortedW.map(w => {
                const wEpics = epics.filter(e => e.workstream === w.id);
                return (
                  <div key={w.id} style={{ display:'grid', gridTemplateColumns:`${LEFT_W}px 1fr`,
                    borderBottom:'1px solid var(--surface-hairline)', minHeight: Math.max(2,wEpics.length)*ROW_H + 20 }}>

                    {/* Workstream label */}
                    <div style={{ padding:'12px 14px', background:`${w.color}08`, borderRight:'1px solid var(--surface-border)',
                      display:'flex', flexDirection:'column', gap:4 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <div style={{ width:4, height:16, borderRadius:2, background:w.color, flexShrink:0 }} />
                        <span style={{ fontSize:11, fontWeight:800, color:w.color, lineHeight:1.3 }}>{w.label}</span>
                      </div>
                      <span style={{ fontSize:10, color:w.color, opacity:.65, paddingLeft:10 }}>{wEpics.length} epic{wEpics.length!==1?'s':''}</span>
                      <button onClick={()=>setAddEpic({workstream:w.id})}
                        style={{ padding:'2px 8px', fontSize:10, fontWeight:700, borderRadius:'var(--r-pill)',
                          border:`1px dashed ${w.color}70`, background:`${w.color}10`, color:w.color, cursor:'pointer', alignSelf:'flex-start', marginTop:2 }}>
                        + Epic
                      </button>
                    </div>

                    {/* Epic bars */}
                    <div style={{ position:'relative', minHeight: Math.max(2,wEpics.length)*ROW_H + 20 }}>
                      {/* Quarter stripe background */}
                      <div style={{ position:'absolute', inset:0, display:'grid',
                        gridTemplateColumns:`repeat(${realQ.length},${COL_W}px)`, pointerEvents:'none' }}>
                        {realQ.map((q,i) => (
                          <div key={q.id} style={{ borderLeft:'1px solid var(--surface-hairline)', background:i%2===0?'transparent':'#fafbfd' }} />
                        ))}
                      </div>

                      {wEpics.length === 0 && !aiLoading && (
                        <div style={{ position:'absolute', top:'50%', left:16, transform:'translateY(-50%)',
                          fontSize:11, color:'var(--grey-300)', fontStyle:'italic', pointerEvents:'none' }}>
                          No epics — click + Epic to add one
                        </div>
                      )}

                      {wEpics.map((epic, rowIdx) => {
                        const si     = qIdx[epic.quarterStart] ?? 0;
                        const ei     = qIdx[epic.quarterEnd]   ?? si;
                        const safeSi = Math.max(0, Math.min(si, realQ.length-1));
                        const safeEi = Math.max(safeSi, Math.min(ei, realQ.length-1));
                        const left   = safeSi * COL_W + 6;
                        const width  = (safeEi - safeSi + 1) * COL_W - 12;
                        const top    = rowIdx * ROW_H + 8;
                        const es     = EPIC_STATUSES.find(s=>s.id===epic.status) || EPIC_STATUSES[0];
                        const isOpen = activeEpic?.id === epic.id;

                        return (
                          <div key={epic.id} onClick={()=>setActiveEpic(isOpen ? null : epic)}
                            style={{ position:'absolute', left, top, width, height:ROW_H-10,
                              borderRadius:'var(--r-md)', cursor:'pointer', userSelect:'none',
                              background: isOpen ? `linear-gradient(135deg,${epic.color},${epic.color}cc)` : `${epic.color}1a`,
                              border:`2px solid ${isOpen ? epic.color : epic.color+'55'}`,
                              display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 10px',
                              transition:'all .15s', boxShadow: isOpen ? `0 4px 16px ${epic.color}40` : 'none', overflow:'hidden' }}
                            onMouseEnter={e=>{ if(!isOpen){ e.currentTarget.style.background=`${epic.color}2e`; e.currentTarget.style.borderColor=epic.color; }}}
                            onMouseLeave={e=>{ if(!isOpen){ e.currentTarget.style.background=`${epic.color}1a`; e.currentTarget.style.borderColor=`${epic.color}55`; }}}>

                            <div style={{ display:'flex', alignItems:'center', gap:6, minWidth:0 }}>
                              <span style={{ width:6, height:6, borderRadius:'50%', background:isOpen?'#fff':es.color, flexShrink:0 }} />
                              <span style={{ fontSize:12, fontWeight:800,
                                color:isOpen?'#fff':epic.color,
                                whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1 }}>
                                {epic.title}
                              </span>
                              {(epic.featureIds||[]).length > 0 && (
                                <span style={{ fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:'var(--r-pill)', flexShrink:0,
                                  background:isOpen?'rgba(255,255,255,.25)':'rgba(0,0,0,.07)',
                                  color:isOpen?'#fff':epic.color }}>
                                  {(epic.featureIds||[]).length}f
                                </span>
                              )}
                            </div>
                            {epic.narrative && width > 220 && (
                              <div style={{ fontSize:10, marginTop:1, paddingLeft:12, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                                color:isOpen?'rgba(255,255,255,.75)':epic.color+'99' }}>
                                {epic.narrative}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Backdrop + drawer */}
      {activeEpic && (
        <>
          <div onClick={()=>setActiveEpic(null)}
            style={{ position:'fixed', inset:0, background:'rgba(19,25,39,.3)', zIndex:8999 }} />
          <EpicDrawer epic={activeEpic} data={data}
            onEdit={()=>{ setEditEpic(activeEpic); setActiveEpic(null); }}
            onDelete={id=>{ dispatch({type:'DELETE_EPIC',id}); setActiveEpic(null); }}
            onClose={()=>setActiveEpic(null)} />
        </>
      )}

      {/* Add / Edit epic modal */}
      {(editEpic || addEpic) && (
        <Modal title={editEpic ? 'Edit Epic' : 'New Epic'} onClose={()=>{ setEditEpic(null); setAddEpic(null); }} wide>
          <EpicForm epic={editEpic || addEpic}
            quarters={data.quarters} workstreams={data.workstreams} allItems={data.items}
            onSave={epic=>{
              const w = data.workstreams.find(w=>w.id===epic.workstream);
              const withColor = { ...epic, color: epic.color||w?.color||'#4f63d2' };
              if (epics.find(e=>e.id===epic.id)) dispatch({type:'UPDATE_EPIC',epic:withColor});
              else dispatch({type:'ADD_EPIC',epic:withColor});
              setEditEpic(null); setAddEpic(null);
            }}
            onClose={()=>{ setEditEpic(null); setAddEpic(null); }} />
        </Modal>
      )}
    </div>
  );
}



function App() {
  // Firebase is OPTIONAL — app works standalone with localStorage by default
  const savedCfg = getFirebaseCfg();
  const [fbReady, setFbReady]   = useState(false);
  const [showFbModal, setShowFbModal] = useState(false); // setup shown as modal, not gate
  const [syncStatus, setSyncStatus]   = useState('local'); // 'local' | 'syncing' | 'synced' | 'error'

  // Roadmap data — localStorage by default, Firebase when connected
  const [data, dispatch_] = React.useReducer(reducer, null, loadData);
  const dispatch = useCallback((action) => { dispatch_(action); }, []);

  // localStorage fallback — always save locally too
  useEffect(() => {
    try { localStorage.setItem('lisa-roadmap-v5', JSON.stringify(data)); } catch {}
  }, [data]);

  const writeLock = useRef(false);
  const lastSent  = useRef(null);

  // On mount — try to auto-connect if saved config exists
  useEffect(() => {
    if (savedCfg) {
      const ok = initFirebase(savedCfg);
      if (ok) setFbReady(true);
      else clearFirebaseCfg();
    }
  }, []);

  // Firebase subscription — only active when fbReady
  useEffect(() => {
    if (!fbReady) return;
    const ref = fbRef();
    if (!ref) return;
    const handler = ref.child('data').on('value', snap => {
      const val = snap.val();
      if (!val) {
        setSyncStatus('syncing');
        ref.child('data').set(migrateData(data)).then(() => setSyncStatus('synced'));
        return;
      }
      const serialised = JSON.stringify(val);
      if (serialised !== lastSent.current) {
        dispatch_({ type:'IMPORT', data: migrateData(val) });
      }
      setSyncStatus('synced');
    }, () => setSyncStatus('error'));
    return () => ref.child('data').off('value', handler);
  }, [fbReady]);

  // Push to Firebase when connected
  useEffect(() => {
    if (!fbReady) return;
    const ref = fbRef();
    if (!ref) return;
    const serialised = JSON.stringify(data);
    if (serialised === lastSent.current) return;
    setSyncStatus('syncing');
    lastSent.current = serialised;
    ref.child('data').set(data)
      .then(() => setSyncStatus('synced'))
      .catch(() => setSyncStatus('error'));
  }, [data, fbReady]);

  const handleConnected = () => {
    setFbReady(true);
    setShowFbModal(false);
  };

  const handleDisconnect = () => {
    clearFirebaseCfg();
    if (_fbApp) { try { _fbApp.delete(); } catch {} }
    _fbApp = null; _fbDb = null;
    setFbReady(false);
    setSyncStatus('local');
  };

  const [mode, setMode]     = useState('tactical');
  const [view, setView]     = useState('board');
  const [showDash, setShowDash]   = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showAddItem, setShowAddItem] = useState(false);
  const [showAddQ, setShowAddQ] = useState(false);
  const [showAddW, setShowAddW] = useState(false);
  const [filters, setFilters] = useState({ status:'', priority:'', quarter:'', workstream:'', owner:'', search:'' });
  const [showFilters, setShowFilters] = useState(false);
  const [newQLabel, setNewQLabel] = useState('');
  const [newWLabel, setNewWLabel] = useState('');

  // No gate — app always opens. Firebase is opt-in.
  const activeFilters = Object.values(filters).filter(Boolean).length;

  const topBarBtn = (label, onClick, active, icon) => (
    <button onClick={onClick} style={{ padding:'7px 14px', borderRadius:'var(--r-md)', border: active ? '1px solid #4f63d2' : '1px solid var(--surface-border)',
      background: active ? '#edeffe' : '#fff', color: active ? '#4f63d2' : 'var(--fg-2)', fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6, transition:'all .15s' }}
      onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='var(--grey-50)'; }}
      onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='#fff'; }}>
      {icon && <span>{icon}</span>}{label}
    </button>
  );

  const WS_COLORS = ['#4f63d2','#9747ff','#10b981','#f59e0b','#e76f8f','#3b82f6','#ef4444'];

  return (
    <div style={{ minHeight:'100vh', background:'var(--surface-page)', fontFamily:'var(--font-body)' }}>
      {/* TOP BAR */}
      <div style={{ height:60, background:'#fff', borderBottom:'1px solid var(--surface-border)', position:'sticky', top:0, zIndex:100,
        display:'flex', alignItems:'center', padding:'0 24px', gap:12, boxShadow:'var(--shadow-100)' }}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:10, marginRight:8 }}>
          <div style={{ width:32, height:32, borderRadius:'var(--r-md)', background:'var(--lisa-gradient)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <span style={{ color:'#fff', fontWeight:800, fontSize:15 }}>L</span>
          </div>
          <div>
            <div style={{ fontSize:15, fontWeight:800, fontFamily:'var(--font-display)', lineHeight:1 }}>
              <span style={{ background:'var(--lisa-gradient)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent' }}>LISA</span>
              <span style={{ color:'var(--grey-700)' }}> Roadmap</span>
            </div>
            <div style={{ fontSize:10, color:'var(--grey-500)', fontWeight:600, textTransform:'uppercase', letterSpacing:.5 }}>Product Board</div>
          </div>
        </div>

        {/* Mode switcher — Tactical vs Leadership */}
        <div style={{ display:'flex', gap:2, background:'#1e1b4b', borderRadius:'var(--r-md)', padding:3, marginRight:4 }}>
          {[['tactical','🗂 Tactical'],['leadership','🎯 Leadership']].map(([m,l])=>(
            <button key={m} onClick={()=>{ setMode(m); setShowDash(false); }}
              style={{ padding:'5px 14px', borderRadius:'var(--r-sm)', border:'none',
                background: mode===m ? 'var(--lisa-gradient)' : 'transparent',
                fontWeight:700, fontSize:12,
                color: mode===m ? '#fff' : 'rgba(255,255,255,.5)',
                boxShadow: mode===m ? '0 2px 8px rgba(0,0,0,.3)' : 'none',
                transition:'all .15s' }}>
              {l}
            </button>
          ))}
        </div>

        {/* Search — only in tactical mode */}
        {mode==='tactical' && (
          <div style={{ flex:1, maxWidth:280, position:'relative' }}>
            <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--grey-400)', fontSize:15 }}>🔍</span>
            <input value={filters.search} onChange={e=>setFilters(f=>({...f,search:e.target.value}))} placeholder="Search initiatives..."
              style={{ width:'100%', padding:'7px 12px 7px 32px', border:'1px solid var(--surface-border)', borderRadius:'var(--r-md)', fontSize:13, background:'var(--grey-50)' }}
              onFocus={e=>e.target.style.background='#fff'} onBlur={e=>e.target.style.background='var(--grey-50)'} />
          </div>
        )}

        <div style={{ display:'flex', gap:8, alignItems:'center', marginLeft:'auto' }}>
          <SyncIndicator status={syncStatus} />

          {mode==='tactical' && (<>
            {/* View toggle */}
            <div style={{ display:'flex', gap:2, background:'var(--grey-100)', borderRadius:'var(--r-md)', padding:3 }}>
              {[['board','🗂 Board'],['list','📋 List']].map(([v,l])=>(
                <button key={v} onClick={()=>{setView(v);setShowDash(false);}} style={{ padding:'5px 12px', borderRadius:'var(--r-sm)', border:'none',
                  background: view===v&&!showDash ? '#fff' : 'transparent', fontWeight:700, fontSize:12,
                  color: view===v&&!showDash ? 'var(--fg-1)' : 'var(--grey-500)', boxShadow: view===v&&!showDash ? 'var(--shadow-100)' : 'none' }}>
                  {l}
                </button>
              ))}
            </div>
            {topBarBtn('Dashboard', ()=>{setShowDash(d=>!d);}, showDash, '📊')}
            {topBarBtn(`Filters${activeFilters>0?` (${activeFilters})`:''}`, ()=>setShowFilters(f=>!f), showFilters || activeFilters>0, '⚙️')}
          </>)}

          {topBarBtn('Import/Export', ()=>setShowImport(true), false, '↕')}
          {fbReady ? (
            <button onClick={handleDisconnect} title="Disconnect from Firebase"
              style={{ padding:'7px 12px', borderRadius:'var(--r-md)', border:'1px solid #10b981',
                background:'#ecfdf5', color:'#059669', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:5 }}
              onMouseEnter={e=>{ e.currentTarget.style.background='#d1fae5'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='#ecfdf5'; }}>
              🔗 Team Connected
            </button>
          ) : (
            <button onClick={()=>setShowFbModal(true)} title="Connect team via Firebase"
              style={{ padding:'7px 12px', borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)',
                background:'#fff', color:'var(--grey-600)', fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:5 }}
              onMouseEnter={e=>{ e.currentTarget.style.background='var(--grey-50)'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='#fff'; }}>
              👥 Connect Team
            </button>
          )}

          {mode==='tactical' && (
            <button onClick={()=>setShowAddItem(true)} style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'none',
              background:'var(--lisa-gradient)', color:'#fff', fontSize:13, fontWeight:700, display:'flex', alignItems:'center', gap:6 }}>
              + New Initiative
            </button>
          )}
        </div>
      </div>

      {/* FILTERS BAR */}
      {showFilters && (
        <div style={{ background:'#fff', borderBottom:'1px solid var(--surface-border)', padding:'12px 24px', display:'flex', gap:10, flexWrap:'wrap', alignItems:'center' }}>
          {[
            ['Status','status', [{value:'',label:'All Statuses'},...STATUSES.map(s=>({value:s.id,label:s.label}))]],
            ['Priority','priority', [{value:'',label:'All Priorities'},...PRIORITIES.map(p=>({value:p,label:p}))]],
            ['Quarter','quarter', [{value:'',label:'All Quarters'},...data.quarters.map(q=>({value:q.id,label:q.label}))]],
            ['Workstream','workstream', [{value:'',label:'All Workstreams'},...data.workstreams.map(w=>({value:w.id,label:w.label}))]],
          ].map(([label,key,options])=>(
            <select key={key} value={filters[key]} onChange={e=>setFilters(f=>({...f,[key]:e.target.value}))}
              style={{ padding:'6px 10px', border:'1px solid var(--surface-border)', borderRadius:'var(--r-md)', fontSize:13, background:'#fff',
                color: filters[key] ? '#4f63d2' : 'var(--fg-2)', fontWeight: filters[key] ? 700 : 400 }}>
              {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          ))}
          <input value={filters.owner} onChange={e=>setFilters(f=>({...f,owner:e.target.value}))} placeholder="Filter by owner..."
            style={{ padding:'6px 10px', border:'1px solid var(--surface-border)', borderRadius:'var(--r-md)', fontSize:13 }} />
          {activeFilters > 0 && (
            <button onClick={()=>setFilters({status:'',priority:'',quarter:'',workstream:'',owner:'',search:''})}
              style={{ padding:'6px 12px', borderRadius:'var(--r-md)', border:'1px solid #ef4444', background:'#fee2e2', color:'#dc2626', fontSize:12, fontWeight:700 }}>
              Clear All
            </button>
          )}
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{ padding:'16px 24px 24px' }}>

        {mode === 'leadership' ? (
          <LeadershipView data={data} dispatch={dispatch} />
        ) : (
          <>
            {/* Page header — tactical only */}
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
              <div>
                <h1 style={{ fontSize:24, fontWeight:800, fontFamily:'var(--font-display)', marginBottom:3 }}>
                  {showDash ? 'Roadmap Dashboard' : view==='board' ? 'Board View' : 'List View'}
                </h1>
                <p style={{ fontSize:13, color:'var(--grey-500)' }}>{data.items.length} total initiatives · {data.quarters.length} quarters · {data.workstreams.length} workstreams</p>
              </div>
              {!showDash && (
                <div style={{ marginLeft:'auto', display:'flex', gap:8 }}>
                  {topBarBtn('+ Quarter', ()=>setShowAddQ(true), false)}
                  {topBarBtn('+ Workstream', ()=>setShowAddW(true), false)}
                </div>
              )}
            </div>

            {showDash ? (
              <Dashboard data={data} />
            ) : view==='board' ? (
              <div style={{ background:'#fff', borderRadius:'var(--r-xl)', border:'1px solid var(--surface-border)', boxShadow:'var(--shadow-100)' }}>
                <BoardView data={data} dispatch={dispatch} filters={filters} />
              </div>
            ) : (
              <div style={{ background:'#fff', borderRadius:'var(--r-xl)', border:'1px solid var(--surface-border)', boxShadow:'var(--shadow-100)', overflow:'hidden' }}>
                <ListView data={data} dispatch={dispatch} filters={filters} />
              </div>
            )}
          </>
        )}
      </div>

      {/* MODALS */}
      {showAddItem && (
        <Modal title="New Initiative" onClose={()=>setShowAddItem(false)} wide>
          <ItemForm quarters={data.quarters} workstreams={data.workstreams} allItems={data.items}
            onSave={item=>{dispatch({type:'ADD_ITEM',item:{...item,id:genId()}});setShowAddItem(false);}} onClose={()=>setShowAddItem(false)} />
        </Modal>
      )}
      {showAddQ && (
        <Modal title="Add Quarter" onClose={()=>{setShowAddQ(false);setNewQLabel('');}}>
          <div style={{ padding:24 }}>
            <label style={{ display:'block', fontSize:13, fontWeight:600, marginBottom:6 }}>Quarter Label</label>
            <input value={newQLabel} onChange={e=>setNewQLabel(e.target.value)} placeholder="e.g. Q1 2027" autoFocus
              style={{ width:'100%', padding:'9px 12px', border:'1px solid var(--surface-border)', borderRadius:'var(--r-md)', fontSize:14, marginBottom:16 }} />
            <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
              <button onClick={()=>{setShowAddQ(false);setNewQLabel('');}} style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)', background:'#fff', fontWeight:600, fontSize:13 }}>Cancel</button>
              <button onClick={()=>{
                if(!newQLabel.trim()) return;
                const id = 'q-'+Date.now();
                dispatch({type:'ADD_QUARTER',quarter:{id, label:newQLabel.trim(), order:data.quarters.length}});
                setShowAddQ(false); setNewQLabel('');
              }} style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'none', background:'var(--lisa-gradient)', color:'#fff', fontWeight:700, fontSize:13 }}>Add Quarter</button>
            </div>
          </div>
        </Modal>
      )}
      {showAddW && (
        <Modal title="Add Workstream" onClose={()=>{setShowAddW(false);setNewWLabel('');}}>
          <div style={{ padding:24 }}>
            <label style={{ display:'block', fontSize:13, fontWeight:600, marginBottom:6 }}>Workstream Name</label>
            <input value={newWLabel} onChange={e=>setNewWLabel(e.target.value)} placeholder="e.g. Security & Compliance" autoFocus
              style={{ width:'100%', padding:'9px 12px', border:'1px solid var(--surface-border)', borderRadius:'var(--r-md)', fontSize:14, marginBottom:16 }} />
            <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
              <button onClick={()=>{setShowAddW(false);setNewWLabel('');}} style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'1px solid var(--surface-border)', background:'#fff', fontWeight:600, fontSize:13 }}>Cancel</button>
              <button onClick={()=>{
                if(!newWLabel.trim()) return;
                const id = 'w-'+Date.now();
                const col = WS_COLORS[data.workstreams.length % WS_COLORS.length];
                dispatch({type:'ADD_WORKSTREAM',workstream:{id, label:newWLabel.trim(), order:data.workstreams.length, color:col}});
                setShowAddW(false); setNewWLabel('');
              }} style={{ padding:'8px 18px', borderRadius:'var(--r-md)', border:'none', background:'var(--lisa-gradient)', color:'#fff', fontWeight:700, fontSize:13 }}>Add Workstream</button>
            </div>
          </div>
        </Modal>
      )}
      {showImport && (
        <Modal title="Import / Export" onClose={()=>setShowImport(false)}>
          <ImportExport data={data} onImport={d=>dispatch({type:'IMPORT',data:d})} onClose={()=>setShowImport(false)} />
        </Modal>
      )}
      {showFbModal && (
        <Modal title="Connect Team via Firebase" onClose={()=>setShowFbModal(false)}>
          <FirebaseSetup onConnected={handleConnected} />
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
